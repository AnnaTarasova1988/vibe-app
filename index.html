<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe — Мессенджер</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0f14;--bg2:#16181f;--bg3:#1e2029;--bg4:#252834;--accent:#6c63ff;--accent2:#a78bfa;--text:#f0f0f5;--text2:#9a9ab0;--text3:#5a5a70;--border:rgba(255,255,255,0.07);--green:#4ade80;--font:'Sora',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;}

#auth-screen{display:flex;align-items:center;justify-content:center;height:100dvh;flex-direction:column;background:radial-gradient(ellipse at 60% 20%,#1a1535 0%,var(--bg) 60%);}
.auth-logo{font-size:42px;font-weight:600;color:var(--accent2);letter-spacing:-1px;margin-bottom:6px;}
.auth-sub{font-size:13px;color:var(--text3);margin-bottom:40px;}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:32px 28px;width:360px;max-width:94vw;}
.auth-tabs{display:flex;gap:4px;background:var(--bg3);border-radius:12px;padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;padding:9px;border:none;background:transparent;border-radius:9px;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text2);transition:all .2s;}
.auth-tab.active{background:var(--accent);color:#fff;}
.auth-field{margin-bottom:16px;}
.auth-field label{font-size:12px;color:var(--text2);display:block;margin-bottom:6px;}
.auth-field input,.modal-input{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s;}
.auth-field input:focus,.modal-input:focus{border-color:var(--accent);}
.auth-field input::placeholder,.modal-input::placeholder{color:var(--text3);}
.auth-btn{width:100%;padding:14px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:4px;}
.auth-btn:hover{opacity:.9;}.auth-btn:active{transform:scale(.98);}
.auth-remember{display:flex;align-items:center;gap:8px;margin:12px 0 4px;cursor:pointer;font-size:13px;color:var(--text2);}
.auth-remember input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;}
.auth-error{font-size:12px;color:#f87171;margin-top:8px;min-height:18px;}
.auth-info{font-size:11px;color:var(--text3);margin-top:14px;text-align:center;line-height:1.6;}

#app{display:none;height:100dvh;}
#app.visible{display:flex;}

.sidebar{width:320px;min-width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.sidebar-header{padding:20px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.my-avatar{width:38px;height:38px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer;flex-shrink:0;}
.sidebar-title{font-size:17px;font-weight:600;flex:1;}
.icon-btn{width:34px;height:34px;border-radius:50%;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background .15s;font-size:18px;}
.icon-btn:hover{background:var(--bg3);}
.search-wrap{padding:12px 14px;position:relative;}
.search-icon{position:absolute;left:24px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;font-size:14px;}
.search-input{width:100%;padding:9px 14px 9px 36px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;}
.search-input::placeholder{color:var(--text3);}
.tabs-bar{display:flex;border-bottom:1px solid var(--border);padding:0 14px;}
.tab-btn{flex:1;padding:10px 4px;border:none;background:transparent;color:var(--text2);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.tab-btn.active{color:var(--accent2);border-bottom-color:var(--accent2);}
.chat-list{flex:1;overflow-y:auto;}
.chat-list::-webkit-scrollbar{width:4px;}
.chat-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
.chat-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);}
.chat-item:hover,.chat-item.active{background:var(--bg3);}
.chat-avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;flex-shrink:0;position:relative;}
.online-dot{position:absolute;bottom:1px;right:1px;width:11px;height:11px;background:var(--green);border-radius:50%;border:2px solid var(--bg2);}
.chat-info{flex:1;min-width:0;}
.chat-name{font-size:14px;font-weight:500;}
.chat-preview{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.chat-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.chat-time{font-size:11px;color:var(--text3);}
.unread-badge{background:var(--accent);color:#fff;font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center;}
.del-btn{background:transparent;border:none;color:#f87171;cursor:pointer;font-size:14px;padding:2px 4px;opacity:0;transition:opacity .15s;}
.chat-item:hover .del-btn{opacity:1;}

.chat-area{flex:1;display:flex;flex-direction:column;background:var(--bg);}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text3);}
.empty-icon{font-size:52px;opacity:.3;}
.chat-header{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg2);position:relative;}
.chat-header-name{font-size:15px;font-weight:600;}
.chat-header-status{font-size:12px;color:var(--green);}
.chat-ctx-menu{position:absolute;right:12px;top:58px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:6px;z-index:100;min-width:180px;display:none;}
.chat-ctx-menu.open{display:block;}
.ctx-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:14px;transition:background .15s;}
.ctx-item:hover{background:var(--bg3);}
.ctx-item.danger{color:#f87171;}
.messages-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:6px;}
.messages-area::-webkit-scrollbar{width:4px;}
.messages-area::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px;}
.msg-day{text-align:center;font-size:11px;color:var(--text3);margin:8px 0;position:relative;}
.msg-day::before,.msg-day::after{content:'';position:absolute;top:50%;width:30%;height:1px;background:var(--border);}
.msg-day::before{left:0;}.msg-day::after{right:0;}
.msg-wrap{display:flex;flex-direction:column;max-width:72%;}
.msg-wrap.me{align-self:flex-end;align-items:flex-end;}
.msg-wrap.other{align-self:flex-start;align-items:flex-start;}
.msg-bubble{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;}
.me .msg-bubble{background:#6c63ff;color:#fff;border-bottom-right-radius:4px;}
.other .msg-bubble{background:var(--bg4);color:var(--text);border-bottom-left-radius:4px;}
.msg-time{font-size:10px;color:var(--text3);margin:2px 4px;}
.msg-media{max-width:240px;border-radius:12px;margin:4px 0;cursor:pointer;display:block;}
.input-area{padding:12px 16px;border-top:1px solid var(--border);background:var(--bg2);display:flex;align-items:flex-end;gap:10px;position:relative;}
.msg-input{flex:1;padding:11px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;resize:none;max-height:120px;line-height:1.5;transition:border-color .2s;}
.msg-input:focus{border-color:var(--accent);}
.msg-input::placeholder{color:var(--text3);}
.send-btn{width:42px;height:42px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0;transition:opacity .2s,transform .1s;}
.send-btn:hover{opacity:.9;}.send-btn:active{transform:scale(.92);}
.attach-btn{width:36px;height:36px;border-radius:50%;background:transparent;border:none;cursor:pointer;color:var(--text2);font-size:20px;display:flex;align-items:center;justify-content:center;transition:color .2s;}
.attach-btn:hover{color:var(--accent2);}
.emoji-picker{position:absolute;bottom:72px;left:16px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:12px;width:300px;display:none;flex-wrap:wrap;gap:4px;z-index:50;max-height:200px;overflow-y:auto;}
.emoji-picker.open{display:flex;}
.emoji-btn-item{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:19px;border-radius:8px;cursor:pointer;border:none;background:transparent;}
.emoji-btn-item:hover{background:var(--bg3);}

.contacts-panel{position:fixed;right:0;top:0;bottom:0;width:300px;background:var(--bg2);border-left:1px solid var(--border);z-index:100;transform:translateX(100%);transition:transform .3s;display:flex;flex-direction:column;}
.contacts-panel.open{transform:translateX(0);}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:18px 16px;border-bottom:1px solid var(--border);}
.panel-title{font-size:15px;font-weight:600;}
.contact-item{display:flex;align-items:center;gap:12px;padding:12px 16px;transition:background .15s;}
.contact-item:hover{background:var(--bg3);}
.add-contact-btn{margin:12px 16px;padding:11px;background:var(--bg3);border:1px dashed var(--border);border-radius:12px;cursor:pointer;text-align:center;font-size:13px;color:var(--text2);transition:all .2s;}
.add-contact-btn:hover{border-color:var(--accent);color:var(--accent2);}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;width:360px;max-width:94vw;}
.modal h3{font-size:16px;font-weight:600;margin-bottom:18px;}
.modal-btn{padding:11px 20px;border-radius:10px;border:none;cursor:pointer;font-family:var(--font);font-size:14px;font-weight:500;transition:opacity .2s;}
.modal-btn.primary{background:var(--accent);color:#fff;}
.modal-btn.secondary{background:var(--bg3);color:var(--text2);}
.modal-btn:hover{opacity:.85;}
.modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}
.user-found-card{display:flex;align-items:center;gap:10px;background:var(--bg3);border-radius:10px;padding:10px 12px;margin-top:10px;}
.group-chip{display:inline-flex;align-items:center;gap:6px;background:var(--bg4);border-radius:8px;padding:4px 10px;font-size:12px;margin:3px;}

.profile-panel{position:fixed;inset:0;background:var(--bg2);z-index:300;display:none;flex-direction:column;}
.profile-panel.open{display:flex;}
.profile-avatar-big{width:90px;height:90px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:600;margin:0 auto 14px;}
.profile-name{text-align:center;font-size:20px;font-weight:600;margin-bottom:4px;}
.profile-phone{text-align:center;font-size:14px;color:var(--text2);}
.profile-section{padding:20px;border-top:1px solid var(--border);}
.logout-btn{width:100%;padding:12px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);border-radius:12px;color:#f87171;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;}
.logout-btn:hover{background:rgba(248,113,113,.2);}

@media(max-width:680px){
  .sidebar{width:100%;min-width:unset;position:absolute;inset:0;z-index:10;}
  .sidebar.hidden{display:none;}
  .chat-area{position:absolute;inset:0;z-index:5;display:none;}
  .chat-area.visible{display:flex;}
}
.hidden{display:none!important;}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo">Vibe</div>
  <div class="auth-sub">Мессенджер нового поколения</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Войти</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Регистрация</button>
    </div>
    <div id="login-form">
      <div class="auth-field"><label>Номер телефона</label><input type="tel" id="login-phone" placeholder="+7 999 123-45-67"></div>
      <div class="auth-field"><label>Пароль</label><input type="password" id="login-pass" placeholder="••••••••"></div>
      <label class="auth-remember"><input type="checkbox" id="remember-me" checked> Запомнить меня</label>
      <button class="auth-btn" onclick="doLogin()">Войти</button>
      <div class="auth-error" id="login-error"></div>
    </div>
    <div id="register-form" class="hidden">
      <div class="auth-field"><label>Имя</label><input type="text" id="reg-name" placeholder="Иван Иванов"></div>
      <div class="auth-field"><label>Номер телефона</label><input type="tel" id="reg-phone" placeholder="+7 999 123-45-67"></div>
      <div class="auth-field"><label>Пароль</label><input type="password" id="reg-pass" placeholder="Минимум 6 символов"></div>
      <button class="auth-btn" onclick="doRegister()">Создать аккаунт</button>
      <div class="auth-error" id="reg-error"></div>
      <div class="auth-info">Регистрируясь, вы соглашаетесь с правилами использования</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="my-avatar" id="my-avatar" onclick="openProfile()">А</div>
      <div class="sidebar-title">Vibe</div>
      <button class="icon-btn" onclick="openContacts()" title="Контакты">👥</button>
      <button class="icon-btn" onclick="openNewGroup()" title="Новая группа">＋</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="Поиск..." oninput="filterChats()">
    </div>
    <div class="tabs-bar">
      <button class="tab-btn active" onclick="switchChatTab('all',this)">Все</button>
      <button class="tab-btn" onclick="switchChatTab('personal',this)">Личные</button>
      <button class="tab-btn" onclick="switchChatTab('groups',this)">Группы</button>
    </div>
    <div class="chat-list" id="chat-list"></div>
  </div>

  <div class="chat-area" id="chat-area">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">💬</div>
      <div>Выберите чат, чтобы начать</div>
    </div>
    <div id="active-chat" class="hidden" style="display:flex;flex-direction:column;flex:1;">
      <div class="chat-header">
        <button class="icon-btn" onclick="goBack()">←</button>
        <div class="chat-avatar" id="ch-avatar" style="width:38px;height:38px;font-size:14px;"></div>
        <div style="flex:1;">
          <div class="chat-header-name" id="ch-name"></div>
          <div class="chat-header-status" id="ch-status"></div>
        </div>
        <button class="icon-btn" onclick="toggleChatMenu()">⋯</button>
        <div class="chat-ctx-menu" id="chat-ctx-menu">
          <div class="ctx-item danger" onclick="confirmDeleteChat()">🗑 Удалить чат</div>
        </div>
      </div>
      <div class="messages-area" id="messages-area"></div>
      <div class="input-area">
        <div class="emoji-picker" id="emoji-picker"></div>
        <button class="attach-btn" onclick="toggleEmoji()">😊</button>
        <label class="attach-btn" title="Фото">
          📎<input type="file" accept="image/*,video/*" style="display:none" onchange="attachFile(this)">
        </label>
        <textarea class="msg-input" id="msg-input" placeholder="Написать сообщение..." rows="1"
          onkeydown="msgKeydown(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- CONTACTS -->
<div class="contacts-panel" id="contacts-panel">
  <div class="panel-header">
    <div class="panel-title">Контакты</div>
    <button class="icon-btn" onclick="closeContacts()">✕</button>
  </div>
  <div class="add-contact-btn" onclick="openAddContact()">＋ Добавить контакт</div>
  <div id="contacts-list" style="overflow-y:auto;flex:1;"></div>
</div>

<!-- PROFILE -->
<div class="profile-panel" id="profile-panel">
  <div class="chat-header" style="position:static;">
    <button class="icon-btn" onclick="closeProfile()">←</button>
    <div class="sidebar-title">Профиль</div>
  </div>
  <div style="padding:32px 20px 20px;text-align:center;border-bottom:1px solid var(--border);">
    <div class="profile-avatar-big" id="profile-avatar-big">А</div>
    <div class="profile-name" id="profile-name-big"></div>
    <div class="profile-phone" id="profile-phone-big"></div>
  </div>
  <div class="profile-section">
    <div class="auth-field">
      <label>Имя</label>
      <input type="text" id="edit-name" class="modal-input">
    </div>
    <button class="auth-btn" onclick="saveProfile()">Сохранить</button>
  </div>
  <div class="profile-section">
    <button class="logout-btn" onclick="doLogout()">Выйти из аккаунта</button>
  </div>
</div>

<!-- MODAL: Add Contact -->
<div class="modal-overlay" id="add-contact-modal">
  <div class="modal">
    <h3>Добавить контакт</h3>
    <div class="auth-field">
      <label>Номер телефона</label>
      <input type="tel" id="contact-phone-input" class="modal-input" placeholder="+7 999 000-00-00">
    </div>
    <div id="user-found-result"></div>
    <div class="auth-error" id="contact-error"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal('add-contact-modal')">Отмена</button>
      <button class="modal-btn primary" onclick="searchAndAddContact()">Найти</button>
    </div>
  </div>
</div>

<!-- MODAL: Delete -->
<div class="modal-overlay" id="delete-chat-modal">
  <div class="modal">
    <h3>Удалить чат?</h3>
    <p style="font-size:14px;color:var(--text2);">Все сообщения удалятся безвозвратно.</p>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal('delete-chat-modal')">Отмена</button>
      <button class="modal-btn primary" style="background:#f87171;" onclick="deleteChatConfirmed()">Удалить</button>
    </div>
  </div>
</div>

<!-- MODAL: New Group -->
<div class="modal-overlay" id="new-group-modal">
  <div class="modal">
    <h3>Новая группа</h3>
    <div class="auth-field">
      <label>Название</label>
      <input type="text" id="group-name-input" class="modal-input" placeholder="Название группы...">
    </div>
    <div class="auth-field">
      <label>Участники</label>
      <div id="group-chips" style="min-height:28px;margin-bottom:6px;"></div>
      <div id="group-contacts-select" style="background:var(--bg3);border-radius:10px;max-height:160px;overflow-y:auto;"></div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal('new-group-modal')">Отмена</button>
      <button class="modal-btn primary" onclick="createGroup()">Создать</button>
    </div>
  </div>
</div>

<script>
// Глобальные функции — доступны из onclick в HTML
function switchTab(t){
  document.getElementById('tab-login').classList.toggle('active',t==='login');
  document.getElementById('tab-register').classList.toggle('active',t==='register');
  document.getElementById('login-form').classList.toggle('hidden',t==='register');
  document.getElementById('register-form').classList.toggle('hidden',t==='login');
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function openProfile(){document.getElementById('profile-panel').classList.add('open');}
function closeProfile(){document.getElementById('profile-panel').classList.remove('open');}
function openContacts(){document.getElementById('contacts-panel').classList.add('open');}
function closeContacts(){document.getElementById('contacts-panel').classList.remove('open');}
function toggleChatMenu(){document.getElementById('chat-ctx-menu').classList.toggle('open');}
function goBack(){
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('chat-area').classList.remove('visible');
}
function switchChatTab(t,el){
  window._chatFilter=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}
function filterChats(){if(window._subscribeChats) window._subscribeChats();}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function msgKeydown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(window._sendMessage) window._sendMessage();}}
function sendMessage(){if(window._sendMessage) window._sendMessage();}
function attachFile(input){if(window._attachFile) window._attachFile(input);}
function toggleEmoji(){document.getElementById('emoji-picker').classList.toggle('open');}
function insertEmoji(e){const i=document.getElementById('msg-input');i.value+=e;i.focus();document.getElementById('emoji-picker').classList.remove('open');}
function doLogin(){if(window._doLogin) window._doLogin();}
function doRegister(){if(window._doRegister) window._doRegister();}
function doLogout(){if(window._doLogout) window._doLogout();}
function saveProfile(){if(window._saveProfile) window._saveProfile();}
function openAddContact(){
  document.getElementById('contact-phone-input').value='';
  document.getElementById('contact-error').textContent='';
  document.getElementById('user-found-result').innerHTML='';
  document.getElementById('add-contact-modal').classList.add('open');
}
function searchAndAddContact(){if(window._searchAndAddContact) window._searchAndAddContact();}
function confirmAddContact(){if(window._confirmAddContact) window._confirmAddContact();}
function confirmDeleteChat(){
  window._chatToDelete=window._currentChatId;
  document.getElementById('chat-ctx-menu').classList.remove('open');
  document.getElementById('delete-chat-modal').classList.add('open');
}
function deleteChatById(id){
  window._chatToDelete=id;
  document.getElementById('delete-chat-modal').classList.add('open');
}
function deleteChatConfirmed(){if(window._deleteChatConfirmed) window._deleteChatConfirmed();}
function openChat(id,type){if(window._openChat) window._openChat(id,type);}
function startChat(uid,name){if(window._startChat) window._startChat(uid,name);}
function openNewGroup(){if(window._openNewGroup) window._openNewGroup();}
function toggleGroupMember(uid,name,el){if(window._toggleGroupMember) window._toggleGroupMember(uid,name,el);}
function createGroup(){if(window._createGroup) window._createGroup();}

window._chatFilter='all';
window._chatToDelete=null;
window._currentChatId=null;
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, onAuthStateChanged, updateProfile,
  setPersistence, browserLocalPersistence, browserSessionPersistence }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs,
  addDoc, query, where, orderBy, onSnapshot, updateDoc, serverTimestamp, arrayUnion, deleteDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAhD-Y2nf59Z9ESrIYqPRxTsuyXvX2LQEQ",
  authDomain: "vibe-e7317.firebaseapp.com",
  projectId: "vibe-e7317",
  storageBucket: "vibe-e7317.firebasestorage.app",
  messagingSenderId: "179418567747",
  appId: "1:179418567747:web:4226132681f26e72cb30f6"
};

const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);

const $ = id => document.getElementById(id);
let currentUser=null, contacts=[], unsubMessages=null, unsubChats=null;
let selectedGroupMembers=[], foundContactData=null;

const phoneToEmail = p => p.replace(/\D/g,'')+`@vibe.app`;
const initials = n => n?n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase():'?';
const avatarColor = s => {
  const c=['#6c63ff','#a78bfa','#60a5fa','#34d399','#f59e0b','#f87171','#fb923c','#e879f9'];
  let h=0;for(const x of s)h=(h*31+x.charCodeAt(0))%c.length;return c[h];
};
const fmtTime = ts=>{if(!ts)return'';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});};
const fmtDay  = ts=>{
  if(!ts)return'';
  const d=ts.toDate?ts.toDate():new Date(ts),t=new Date();
  if(d.toDateString()===t.toDateString())return'Сегодня';
  const y=new Date(t);y.setDate(t.getDate()-1);
  if(d.toDateString()===y.toDateString())return'Вчера';
  return d.toLocaleDateString('ru',{day:'numeric',month:'long'});
};

// AUTH
window._doLogin = async()=>{
  const phone=$('login-phone').value.trim(), pass=$('login-pass').value;
  const remember=$('remember-me').checked, err=$('login-error');
  err.textContent='';
  if(!phone||!pass){err.textContent='Заполните все поля';return;}
  try{
    await setPersistence(auth, remember?browserLocalPersistence:browserSessionPersistence);
    await signInWithEmailAndPassword(auth,phoneToEmail(phone),pass);
  }catch(e){
    err.textContent=e.code.includes('invalid-credential')||e.code.includes('wrong-password')
      ?'Неверный номер или пароль':'Ошибка: '+e.message;
  }
};

window._doRegister = async()=>{
  const name=$('reg-name').value.trim(),phone=$('reg-phone').value.trim(),pass=$('reg-pass').value,err=$('reg-error');
  err.textContent='';
  if(!name||!phone||!pass){err.textContent='Заполните все поля';return;}
  if(pass.length<6){err.textContent='Пароль минимум 6 символов';return;}
  try{
    const email=phoneToEmail(phone);
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    await updateProfile(cred.user,{displayName:name});
    await setDoc(doc(db,'users',cred.user.uid),{uid:cred.user.uid,name,phone,email,createdAt:serverTimestamp()});
  }catch(e){
    err.textContent=e.code==='auth/email-already-in-use'?'Номер уже зарегистрирован':e.message;
  }
};

window._doLogout = ()=>signOut(auth);

onAuthStateChanged(auth, async user=>{
  if(user){
    currentUser=user;
    $('auth-screen').style.display='none';
    $('app').classList.add('visible');
    const ini=initials(user.displayName||'');
    $('my-avatar').textContent=ini;
    $('profile-avatar-big').textContent=ini;
    $('profile-name-big').textContent=user.displayName||'';
    $('edit-name').value=user.displayName||'';
    const snap=await getDoc(doc(db,'users',user.uid));
    if(snap.exists())$('profile-phone-big').textContent=snap.data().phone||'';
    await loadContacts();
    subscribeChats();
    initEmoji();
  } else {
    currentUser=null;
    $('auth-screen').style.display='flex';
    $('app').classList.remove('visible');
    if(unsubChats)unsubChats();
    if(unsubMessages)unsubMessages();
  }
});

// PROFILE
window._saveProfile=async()=>{
  const name=$('edit-name').value.trim();if(!name)return;
  await updateProfile(currentUser,{displayName:name});
  await updateDoc(doc(db,'users',currentUser.uid),{name});
  $('profile-name-big').textContent=name;
  $('my-avatar').textContent=initials(name);
  $('profile-avatar-big').textContent=initials(name);
  closeProfile();
};

// CONTACTS
async function loadContacts(){
  const snap=await getDoc(doc(db,'users',currentUser.uid));
  if(!snap.exists())return;
  contacts=[];
  for(const uid of snap.data().contacts||[]){
    const cs=await getDoc(doc(db,'users',uid));
    if(cs.exists())contacts.push(cs.data());
  }
  renderContacts();
}

function renderContacts(){
  const list=$('contacts-list');
  if(!contacts.length){list.innerHTML='<div style="text-align:center;color:var(--text3);padding:24px;font-size:13px;">Нет контактов</div>';return;}
  list.innerHTML=contacts.map(c=>`
    <div class="contact-item">
      <div class="chat-avatar" style="background:${avatarColor(c.uid)};width:40px;height:40px;font-size:14px;">${initials(c.name)}</div>
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:500;">${c.name}</div>
        <div style="font-size:12px;color:var(--text2);">${c.phone||''}</div>
      </div>
      <button onclick="startChat('${c.uid}','${c.name}')"
        style="padding:6px 12px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:var(--font);font-size:12px;cursor:pointer;white-space:nowrap;">
        ✉ Написать
      </button>
    </div>`).join('');
}

window._searchAndAddContact=async()=>{
  const phone=$('contact-phone-input').value.trim(),err=$('contact-error'),result=$('user-found-result');
  err.textContent='';result.innerHTML='';foundContactData=null;
  if(!phone){err.textContent='Введите номер';return;}
  const q=query(collection(db,'users'),where('email','==',phoneToEmail(phone)));
  const snap=await getDocs(q);
  if(snap.empty){err.textContent='Пользователь не найден в Vibe';return;}
  const found=snap.docs[0].data();
  if(found.uid===currentUser.uid){err.textContent='Это ваш номер';return;}
  foundContactData=found;
  result.innerHTML=`<div class="user-found-card">
    <div class="chat-avatar" style="background:${avatarColor(found.uid)};width:42px;height:42px;font-size:15px;">${initials(found.name)}</div>
    <div style="flex:1;"><div style="font-size:14px;font-weight:500;">${found.name}</div><div style="font-size:12px;color:var(--text2);">${found.phone}</div></div>
    <button onclick="confirmAddContact()" style="padding:6px 12px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:var(--font);font-size:12px;cursor:pointer;">Добавить</button>
  </div>`;
};

window._confirmAddContact=async()=>{
  if(!foundContactData)return;
  await updateDoc(doc(db,'users',currentUser.uid),{contacts:arrayUnion(foundContactData.uid)});
  closeModal('add-contact-modal');
  await loadContacts();
};

// CHATS
function subscribeChats(){
  if(unsubChats)unsubChats();
  const q=query(collection(db,'chats'),where('members','array-contains',currentUser.uid));
  unsubChats=onSnapshot(q,snap=>{
    const chats=snap.docs.map(d=>({id:d.id,...d.data()}));
    chats.sort((a,b)=>(b.lastTime?.seconds||0)-(a.lastTime?.seconds||0));
    renderChatList(chats);
  });
}
window._subscribeChats=subscribeChats;

function renderChatList(chats){
  const list=$('chat-list');
  const search=document.querySelector('.search-input').value.toLowerCase();
  let filtered=chats.filter(c=>{
    if(window._chatFilter==='personal')return c.type!=='group';
    if(window._chatFilter==='groups')return c.type==='group';
    return true;
  });
  if(search)filtered=filtered.filter(c=>(c.name||'').toLowerCase().includes(search)||Object.values(c.memberNames||{}).some(n=>n.toLowerCase().includes(search)));
  if(!filtered.length){list.innerHTML='<div style="text-align:center;color:var(--text3);padding:32px;font-size:13px;">Нет чатов</div>';return;}
  list.innerHTML=filtered.map(c=>{
    const uid2=c.members.find(m=>m!==currentUser.uid);
    const name=c.type==='group'?c.name:(c.memberNames?.[uid2]||'Контакт');
    const color=avatarColor(uid2||c.id);
    const unread=c.unread?.[currentUser.uid]||0;
    return`<div class="chat-item${c.id===window._currentChatId?' active':''}" onclick="openChat('${c.id}','${c.type||'personal'}')">
      <div class="chat-avatar" style="background:${color};">${initials(name)}${c.type!=='group'?'<div class="online-dot"></div>':''}</div>
      <div class="chat-info">
        <div class="chat-name">${name}</div>
        <div class="chat-preview">${c.lastMsg||'Нет сообщений'}</div>
      </div>
      <div class="chat-meta">
        <div class="chat-time">${fmtTime(c.lastTime)}</div>
        ${unread>0?`<div class="unread-badge">${unread}</div>`:''}
        <button class="del-btn" onclick="event.stopPropagation();deleteChatById('${c.id}')" title="Удалить чат">🗑</button>
      </div>
    </div>`;
  }).join('');
}

window._openChat=async(chatId,type='personal')=>{
  window._currentChatId=chatId;
  $('empty-state').classList.add('hidden');
  $('active-chat').classList.remove('hidden');
  $('active-chat').style.display='flex';
  const chatSnap=await getDoc(doc(db,'chats',chatId));
  const chatData=chatSnap.data();
  const uid2=chatData.members.find(m=>m!==currentUser.uid);
  let chatName=chatData.name||'Чат';
  if(type!=='group'&&uid2){const us=await getDoc(doc(db,'users',uid2));if(us.exists())chatName=us.data().name;}
  $('ch-avatar').style.background=avatarColor(uid2||chatId);
  $('ch-avatar').textContent=initials(chatName);
  $('ch-name').textContent=chatName;
  $('ch-status').textContent=type==='group'?`${chatData.members.length} участников`:'онлайн';
  await updateDoc(doc(db,'chats',chatId),{[`unread.${currentUser.uid}`]:0});
  $('sidebar').classList.add('hidden');
  $('chat-area').classList.add('visible');
  subscribeMessages(chatId);
};

window._startChat=async(uid2,name)=>{
  closeContacts();
  const q=query(collection(db,'chats'),where('members','array-contains',currentUser.uid),where('type','==','personal'));
  const snap=await getDocs(q);
  const existing=snap.docs.find(d=>d.data().members.includes(uid2));
  if(existing){window._openChat(existing.id,'personal');return;}
  const ref=await addDoc(collection(db,'chats'),{
    type:'personal',members:[currentUser.uid,uid2],
    memberNames:{[currentUser.uid]:currentUser.displayName,[uid2]:name},
    lastMsg:'',lastTime:serverTimestamp(),unread:{[currentUser.uid]:0,[uid2]:0}
  });
  window._openChat(ref.id,'personal');
};

// MESSAGES
function subscribeMessages(chatId){
  if(unsubMessages)unsubMessages();
  const q=query(collection(db,'chats',chatId,'messages'),orderBy('time','asc'));
  unsubMessages=onSnapshot(q,snap=>{
    const msgs=snap.docs.map(d=>({id:d.id,...d.data()}));
    const area=$('messages-area');
    let lastDay='',html='';
    msgs.forEach(m=>{
      const day=fmtDay(m.time);
      if(day!==lastDay){html+=`<div class="msg-day">${day}</div>`;lastDay=day;}
      const me=m.sender===currentUser.uid;
      html+=`<div class="msg-wrap ${me?'me':'other'}">
        <div class="msg-bubble">
          ${m.mediaUrl?`<img src="${m.mediaUrl}" class="msg-media">`:''}
          ${m.text?`<span>${m.text}</span>`:''}
        </div>
        <div class="msg-time">${fmtTime(m.time)}${me?' ✓✓':''}</div>
      </div>`;
    });
    area.innerHTML=html;
    area.scrollTop=area.scrollHeight;
  });
}

window._sendMessage=async()=>{
  const inp=$('msg-input'),text=inp.value.trim();
  if(!text||!window._currentChatId)return;
  inp.value='';autoResize(inp);
  await addDoc(collection(db,'chats',window._currentChatId,'messages'),{text,sender:currentUser.uid,time:serverTimestamp()});
  const chatSnap=await getDoc(doc(db,'chats',window._currentChatId));
  const upd={lastMsg:text.slice(0,60),lastTime:serverTimestamp()};
  chatSnap.data().members.filter(m=>m!==currentUser.uid).forEach(m=>{upd[`unread.${m}`]=((chatSnap.data().unread||{})[m]||0)+1;});
  await updateDoc(doc(db,'chats',window._currentChatId),upd);
};

window._attachFile=async input=>{
  const file=input.files[0];
  if(!file||!window._currentChatId)return;
  if(file.size>4*1024*1024){alert('Максимум 4 МБ');input.value='';return;}
  const reader=new FileReader();
  reader.onload=async e=>{
    await addDoc(collection(db,'chats',window._currentChatId,'messages'),{mediaUrl:e.target.result,text:'',sender:currentUser.uid,time:serverTimestamp()});
    await updateDoc(doc(db,'chats',window._currentChatId),{lastMsg:'📷 Фото',lastTime:serverTimestamp()});
  };
  reader.readAsDataURL(file);
  input.value='';
};

// DELETE
window._deleteChatConfirmed=async()=>{
  const id=window._chatToDelete||window._currentChatId;
  if(!id)return;
  closeModal('delete-chat-modal');
  const msgsSnap=await getDocs(collection(db,'chats',id,'messages'));
  await Promise.all(msgsSnap.docs.map(d=>deleteDoc(d.ref)));
  await deleteDoc(doc(db,'chats',id));
  if(id===window._currentChatId){
    window._currentChatId=null;
    $('active-chat').classList.add('hidden');
    $('empty-state').classList.remove('hidden');
    $('sidebar').classList.remove('hidden');
    $('chat-area').classList.remove('visible');
  }
  window._chatToDelete=null;
};

// GROUPS
window._openNewGroup=()=>{
  selectedGroupMembers=[];
  $('group-name-input').value='';
  $('group-chips').innerHTML='';
  $('group-contacts-select').innerHTML=contacts.length
    ?contacts.map(c=>`<div class="contact-item" style="cursor:pointer;" onclick="toggleGroupMember('${c.uid}','${c.name}',this)">
        <div class="chat-avatar" style="background:${avatarColor(c.uid)};width:34px;height:34px;font-size:12px;">${initials(c.name)}</div>
        <div style="font-size:13px;">${c.name}</div>
      </div>`).join('')
    :'<div style="padding:12px;font-size:12px;color:var(--text3);">Нет контактов</div>';
  $('new-group-modal').classList.add('open');
};

window._toggleGroupMember=(uid,name,el)=>{
  const idx=selectedGroupMembers.findIndex(m=>m.uid===uid);
  if(idx>=0){selectedGroupMembers.splice(idx,1);el.style.background='';}
  else{selectedGroupMembers.push({uid,name});el.style.background='var(--bg4)';}
  $('group-chips').innerHTML=selectedGroupMembers.map(m=>`<span class="group-chip">${m.name}</span>`).join('');
};

window._createGroup=async()=>{
  const name=$('group-name-input').value.trim();
  if(!name||!selectedGroupMembers.length)return;
  const members=[currentUser.uid,...selectedGroupMembers.map(m=>m.uid)];
  const unread={};members.forEach(m=>unread[m]=0);
  const ref=await addDoc(collection(db,'chats'),{type:'group',name,members,lastMsg:'',lastTime:serverTimestamp(),unread,createdBy:currentUser.uid});
  closeModal('new-group-modal');
  window._openChat(ref.id,'group');
};

// EMOJI
const EMOJIS='😀 😂 🥰 😍 🤩 😎 🥳 😊 😉 😋 🤔 😅 😭 😤 🤯 😱 🥺 😴 🤗 😇 👍 👎 ❤️ 🔥 ✨ 🎉 💯 👏 🙌 🤝 💪 🙏 👋 🤞 ✌️ 🫶 💬 🎵 🎶 🌟 ⭐ 💫 🌈 🍕 🍔 ☕ 🎂 🎁 🚀 😆 🙃 😜 🤪 😏 🥹 😔 😞 😢 🤧 💀 👻 🤡 💥 🌊 🌸 🍀 🦋 🐶 🐱'.split(' ');
function initEmoji(){
  $('emoji-picker').innerHTML=EMOJIS.map(e=>`<button class="emoji-btn-item" onclick="insertEmoji('${e}')">${e}</button>`).join('');
}

// Close menus on outside click
document.addEventListener('click',ev=>{
  if(!ev.target.closest('.contacts-panel')&&!ev.target.closest('[onclick="openContacts()"]'))
    $('contacts-panel').classList.remove('open');
  if(!ev.target.closest('#chat-ctx-menu')&&!ev.target.closest('[onclick="toggleChatMenu()"]'))
    $('chat-ctx-menu').classList.remove('open');
  if(!ev.target.closest('#emoji-picker')&&!ev.target.closest('[onclick="toggleEmoji()"]'))
    $('emoji-picker').classList.remove('open');
});
</script>
</body>
