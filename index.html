<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe — Мессенджер</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f14;
    --bg2: #16181f;
    --bg3: #1e2029;
    --bg4: #252834;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --text: #f0f0f5;
    --text2: #9a9ab0;
    --text3: #5a5a70;
    --border: rgba(255,255,255,0.07);
    --green: #4ade80;
    --bubble-me: #6c63ff;
    --bubble-other: #252834;
    --radius: 16px;
    --font: 'Sora', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }

  /* ── AUTH ───────────────────────────────────────── */
  #auth-screen {
    display: flex; align-items: center; justify-content: center;
    height: 100dvh; flex-direction: column; gap: 0;
    background: radial-gradient(ellipse at 60% 20%, #1a1535 0%, var(--bg) 60%);
  }
  .auth-logo {
    font-size: 42px; font-weight: 600; color: var(--accent2);
    letter-spacing: -1px; margin-bottom: 6px;
  }
  .auth-sub { font-size: 13px; color: var(--text3); margin-bottom: 40px; }
  .auth-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 24px; padding: 32px 28px; width: 360px; max-width: 94vw;
  }
  .auth-tabs { display: flex; gap: 4px; background: var(--bg3); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
  .auth-tab {
    flex: 1; padding: 9px; border: none; background: transparent;
    border-radius: 9px; cursor: pointer; font-family: var(--font);
    font-size: 13px; font-weight: 500; color: var(--text2); transition: all .2s;
  }
  .auth-tab.active { background: var(--accent); color: #fff; }
  .auth-field { margin-bottom: 16px; }
  .auth-field label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 6px; }
  .auth-field input {
    width: 100%; padding: 12px 14px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); font-family: var(--font); font-size: 14px; outline: none;
    transition: border-color .2s;
  }
  .auth-field input:focus { border-color: var(--accent); }
  .auth-field input::placeholder { color: var(--text3); }
  .auth-btn {
    width: 100%; padding: 14px; background: var(--accent);
    border: none; border-radius: 12px; color: #fff;
    font-family: var(--font); font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity .2s, transform .1s; margin-top: 4px;
  }
  .auth-btn:hover { opacity: .9; }
  .auth-btn:active { transform: scale(.98); }
  .auth-error { font-size: 12px; color: #f87171; margin-top: 8px; min-height: 18px; }
  .auth-info { font-size: 11px; color: var(--text3); margin-top: 14px; text-align: center; line-height: 1.6; }

  /* ── MAIN APP ───────────────────────────────────── */
  #app { display: none; height: 100dvh; }
  #app.visible { display: flex; }

  /* sidebar */
  .sidebar {
    width: 320px; min-width: 280px; background: var(--bg2);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    transition: transform .3s;
  }
  .sidebar-header {
    padding: 20px 16px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .my-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--accent); display: flex; align-items: center;
    justify-content: center; font-size: 14px; font-weight: 600;
    cursor: pointer; flex-shrink: 0;
  }
  .sidebar-title { font-size: 17px; font-weight: 600; flex: 1; }
  .icon-btn {
    width: 34px; height: 34px; border-radius: 50%; background: transparent;
    border: none; cursor: pointer; display: flex; align-items: center;
    justify-content: center; color: var(--text2); transition: background .15s;
    font-size: 18px;
  }
  .icon-btn:hover { background: var(--bg3); }
  .search-wrap { padding: 12px 14px; }
  .search-input {
    width: 100%; padding: 9px 14px 9px 36px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-family: var(--font);
    font-size: 13px; outline: none; position: relative;
  }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 24px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; font-size: 14px; }
  .search-input::placeholder { color: var(--text3); }
  .tabs-bar {
    display: flex; border-bottom: 1px solid var(--border);
    padding: 0 14px;
  }
  .tab-btn {
    flex: 1; padding: 10px 4px; border: none; background: transparent;
    color: var(--text2); font-family: var(--font); font-size: 12px;
    font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent;
    transition: all .2s;
  }
  .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); }
  .chat-list { flex: 1; overflow-y: auto; }
  .chat-list::-webkit-scrollbar { width: 4px; }
  .chat-list::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

  .chat-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; cursor: pointer; transition: background .15s;
    border-bottom: 1px solid var(--border);
  }
  .chat-item:hover, .chat-item.active { background: var(--bg3); }
  .chat-avatar {
    width: 46px; height: 46px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 16px; flex-shrink: 0; position: relative;
  }
  .online-dot {
    position: absolute; bottom: 1px; right: 1px;
    width: 11px; height: 11px; background: var(--green);
    border-radius: 50%; border: 2px solid var(--bg2);
  }
  .chat-info { flex: 1; min-width: 0; }
  .chat-name { font-size: 14px; font-weight: 500; }
  .chat-preview { font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .chat-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .chat-time { font-size: 11px; color: var(--text3); }
  .unread-badge {
    background: var(--accent); color: #fff;
    font-size: 10px; font-weight: 600;
    padding: 2px 6px; border-radius: 10px; min-width: 18px; text-align: center;
  }

  /* chat area */
  .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px; color: var(--text3);
  }
  .empty-icon { font-size: 52px; opacity: .3; }

  .chat-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }
  .back-btn { display: flex; }
  .chat-header-info { flex: 1; }
  .chat-header-name { font-size: 15px; font-weight: 600; }
  .chat-header-status { font-size: 12px; color: var(--green); }
  .header-actions { display: flex; gap: 4px; }

  .messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 6px; }
  .messages-area::-webkit-scrollbar { width: 4px; }
  .messages-area::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }

  .msg-day {
    text-align: center; font-size: 11px; color: var(--text3);
    margin: 8px 0; position: relative;
  }
  .msg-day::before, .msg-day::after {
    content: ''; position: absolute; top: 50%; width: 30%;
    height: 1px; background: var(--border);
  }
  .msg-day::before { left: 0; }
  .msg-day::after { right: 0; }

  .msg-wrap { display: flex; flex-direction: column; max-width: 72%; }
  .msg-wrap.me { align-self: flex-end; align-items: flex-end; }
  .msg-wrap.other { align-self: flex-start; align-items: flex-start; }

  .msg-bubble {
    padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5;
    word-break: break-word; position: relative;
  }
  .me .msg-bubble {
    background: var(--bubble-me); color: #fff;
    border-bottom-right-radius: 4px;
  }
  .other .msg-bubble {
    background: var(--bubble-other); color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .msg-time { font-size: 10px; color: var(--text3); margin: 2px 4px; }
  .msg-media { max-width: 240px; border-radius: 12px; margin: 4px 0; cursor: pointer; }

  .input-area {
    padding: 12px 16px; border-top: 1px solid var(--border);
    background: var(--bg2); display: flex; align-items: flex-end; gap: 10px;
  }
  .msg-input {
    flex: 1; padding: 11px 16px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 20px;
    color: var(--text); font-family: var(--font); font-size: 14px;
    outline: none; resize: none; max-height: 120px; line-height: 1.5;
    transition: border-color .2s;
  }
  .msg-input:focus { border-color: var(--accent); }
  .msg-input::placeholder { color: var(--text3); }
  .send-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 18px; flex-shrink: 0;
    transition: opacity .2s, transform .1s;
  }
  .send-btn:hover { opacity: .9; }
  .send-btn:active { transform: scale(.92); }
  .attach-btn {
    width: 36px; height: 36px; border-radius: 50%; background: transparent;
    border: none; cursor: pointer; color: var(--text2); font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    transition: color .2s;
  }
  .attach-btn:hover { color: var(--accent2); }

  /* contacts panel */
  .contacts-panel {
    position: fixed; right: 0; top: 0; bottom: 0; width: 300px;
    background: var(--bg2); border-left: 1px solid var(--border);
    z-index: 100; transform: translateX(100%); transition: transform .3s;
    display: flex; flex-direction: column;
  }
  .contacts-panel.open { transform: translateX(0); }
  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 16px; border-bottom: 1px solid var(--border);
  }
  .panel-title { font-size: 15px; font-weight: 600; }
  .contact-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; cursor: pointer; transition: background .15s;
  }
  .contact-item:hover { background: var(--bg3); }
  .add-contact-btn {
    margin: 12px 16px; padding: 11px;
    background: var(--bg3); border: 1px dashed var(--border);
    border-radius: 12px; cursor: pointer; text-align: center;
    font-size: 13px; color: var(--text2); transition: all .2s;
  }
  .add-contact-btn:hover { border-color: var(--accent); color: var(--accent2); }

  /* modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    display: none;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 20px; padding: 28px; width: 360px; max-width: 94vw;
  }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 18px; }
  .modal-btn {
    padding: 11px 20px; border-radius: 10px; border: none;
    cursor: pointer; font-family: var(--font); font-size: 14px;
    font-weight: 500; transition: opacity .2s;
  }
  .modal-btn.primary { background: var(--accent); color: #fff; }
  .modal-btn.secondary { background: var(--bg3); color: var(--text2); }
  .modal-btn:hover { opacity: .85; }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }

  /* group create */
  .group-member-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg4); border-radius: 8px; padding: 4px 10px;
    font-size: 12px; margin: 3px;
  }
  .chip-remove { cursor: pointer; color: var(--text3); font-size: 14px; }

  /* profile */
  .profile-panel {
    position: fixed; inset: 0; background: var(--bg2); z-index: 300;
    display: none; flex-direction: column;
  }
  .profile-panel.open { display: flex; }
  .profile-avatar-big {
    width: 90px; height: 90px; border-radius: 50%;
    background: var(--accent); display: flex; align-items: center;
    justify-content: center; font-size: 32px; font-weight: 600;
    margin: 0 auto 14px;
  }
  .profile-name { text-align: center; font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .profile-phone { text-align: center; font-size: 14px; color: var(--text2); }
  .profile-section { padding: 20px; border-top: 1px solid var(--border); }
  .logout-btn {
    width: 100%; padding: 12px; background: rgba(248,113,113,.1);
    border: 1px solid rgba(248,113,113,.2); border-radius: 12px;
    color: #f87171; font-family: var(--font); font-size: 14px;
    font-weight: 500; cursor: pointer; transition: background .2s;
  }
  .logout-btn:hover { background: rgba(248,113,113,.2); }

  /* responsive */
  @media (max-width: 680px) {
    .sidebar { width: 100%; min-width: unset; position: absolute; inset: 0; z-index: 10; }
    .sidebar.hidden { display: none; }
    .chat-area { position: absolute; inset: 0; z-index: 5; display: none; }
    .chat-area.visible { display: flex; }
  }

  .typing-indicator { display: flex; gap: 4px; padding: 8px 14px; }
  .typing-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--text3);
    animation: bounce .8s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: .15s; }
  .typing-dot:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  .emoji-picker {
    position: absolute; bottom: 70px; left: 16px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 12px; width: 320px;
    display: none; flex-wrap: wrap; gap: 4px; z-index: 50;
    max-height: 220px; overflow-y: auto;
  }
  .emoji-picker.open { display: flex; }
  .emoji-picker::-webkit-scrollbar { width: 4px; }
  .emoji-picker::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }
  .emoji-btn-item {
    width: 36px; height: 36px; display: flex; align-items: center;
    justify-content: center; font-size: 20px; border-radius: 8px;
    cursor: pointer; transition: background .15s; border: none; background: transparent;
  }
  .emoji-btn-item:hover { background: var(--bg3); }
  .input-area { position: relative; }

  /* search result in add contact */
  .user-found-card {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg3); border-radius: 10px; padding: 10px 12px; margin-top: 10px;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo">Vibe</div>
  <div class="auth-sub">Мессенджер нового поколения</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Войти</button>
      <button class="auth-tab" onclick="switchTab('register')">Регистрация</button>
    </div>

    <!-- LOGIN -->
    <div id="login-form">
      <div class="auth-field">
        <label>Номер телефона</label>
        <input type="tel" id="login-phone" placeholder="+7 999 123-45-67">
      </div>
      <div class="auth-field">
        <label>Пароль</label>
        <input type="password" id="login-pass" placeholder="••••••••">
      </div>
      <button class="auth-btn" onclick="doLogin()">Войти</button>
      <div class="auth-error" id="login-error"></div>
    </div>

    <!-- REGISTER -->
    <div id="register-form" class="hidden">
      <div class="auth-field">
        <label>Имя</label>
        <input type="text" id="reg-name" placeholder="Иван Иванов">
      </div>
      <div class="auth-field">
        <label>Номер телефона</label>
        <input type="tel" id="reg-phone" placeholder="+7 999 123-45-67">
      </div>
      <div class="auth-field">
        <label>Пароль</label>
        <input type="password" id="reg-pass" placeholder="Минимум 6 символов">
      </div>
      <button class="auth-btn" onclick="doRegister()">Создать аккаунт</button>
      <div class="auth-error" id="reg-error"></div>
      <div class="auth-info">Регистрируясь, вы соглашаетесь с правилами использования</div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="my-avatar" id="my-avatar" onclick="openProfile()">А</div>
      <div class="sidebar-title">Vibe</div>
      <button class="icon-btn" onclick="openContacts()" title="Контакты">👥</button>
      <button class="icon-btn" onclick="openNewGroup()" title="Новая группа">+</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="Поиск чатов..." oninput="filterChats(this.value)">
    </div>
    <div class="tabs-bar">
      <button class="tab-btn active" onclick="switchChatTab('all',this)">Все</button>
      <button class="tab-btn" onclick="switchChatTab('personal',this)">Личные</button>
      <button class="tab-btn" onclick="switchChatTab('groups',this)">Группы</button>
    </div>
    <div class="chat-list" id="chat-list"></div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chat-area">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">💬</div>
      <div>Выберите чат, чтобы начать</div>
    </div>

    <div id="active-chat" class="hidden" style="display:flex;flex-direction:column;flex:1;">
      <div class="chat-header">
        <button class="icon-btn back-btn" onclick="goBack()">←</button>
        <div class="chat-avatar" id="ch-avatar" style="width:38px;height:38px;font-size:14px;"></div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="ch-name"></div>
          <div class="chat-header-status" id="ch-status">онлайн</div>
        </div>
        <div class="header-actions">
          <button class="icon-btn" title="Звонок">📞</button>
          <button class="icon-btn" title="Видео">📹</button>
          <button class="icon-btn" title="Поиск">🔍</button>
        </div>
      </div>
      <div class="messages-area" id="messages-area"></div>
      <div class="input-area">
        <div class="emoji-picker" id="emoji-picker"></div>
        <button class="attach-btn" onclick="toggleEmoji()" title="Эмодзи">😊</button>
        <label class="attach-btn" title="Прикрепить файл">
          📎<input type="file" accept="image/*,video/*" style="display:none" onchange="attachFile(this)">
        </label>
        <textarea class="msg-input" id="msg-input" placeholder="Написать сообщение..." rows="1"
          onkeydown="msgKeydown(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- CONTACTS PANEL -->
<div class="contacts-panel" id="contacts-panel">
  <div class="panel-header">
    <div class="panel-title">Контакты</div>
    <button class="icon-btn" onclick="closeContacts()">✕</button>
  </div>
  <div class="add-contact-btn" onclick="openAddContact()">+ Добавить контакт</div>
  <div id="contacts-list" style="overflow-y:auto;flex:1;"></div>
</div>

<!-- PROFILE PANEL -->
<div class="profile-panel" id="profile-panel">
  <div class="chat-header">
    <button class="icon-btn" onclick="closeProfile()">←</button>
    <div class="sidebar-title">Профиль</div>
  </div>
  <div style="padding:32px 20px 20px;text-align:center;border-bottom:1px solid var(--border);">
    <div class="profile-avatar-big" id="profile-avatar-big">А</div>
    <div class="profile-name" id="profile-name-big"></div>
    <div class="profile-phone" id="profile-phone-big"></div>
  </div>
  <div class="profile-section">
    <div class="auth-field">
      <label>Имя</label>
      <input type="text" id="edit-name" class="auth-field input" style="width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;">
    </div>
    <button class="auth-btn" onclick="saveProfile()">Сохранить</button>
  </div>
  <div class="profile-section">
    <button class="logout-btn" onclick="doLogout()">Выйти из аккаунта</button>
  </div>
</div>

<!-- MODAL: Add Contact -->
<div class="modal-overlay" id="add-contact-modal">
  <div class="modal">
    <h3>Добавить контакт</h3>
    <div class="auth-field">
      <label>Номер телефона</label>
      <input type="tel" id="contact-phone-input" placeholder="+7 999 000-00-00"
        style="width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;">
    </div>
    <div id="user-found-result"></div>
    <div class="auth-error" id="contact-error"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal('add-contact-modal')">Отмена</button>
      <button class="modal-btn primary" onclick="searchAndAddContact()">Найти</button>
    </div>
  </div>
</div>

<!-- MODAL: New Group -->
<div class="modal-overlay" id="new-group-modal">
  <div class="modal">
    <h3>Новая группа</h3>
    <div class="auth-field">
      <label>Название группы</label>
      <input type="text" id="group-name-input" placeholder="Название..."
        style="width:100%;padding:11px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;">
    </div>
    <div class="auth-field">
      <label>Участники</label>
      <div id="group-chips" style="min-height:32px;margin-bottom:6px;"></div>
      <div id="group-contacts-select" style="background:var(--bg3);border-radius:10px;max-height:160px;overflow-y:auto;"></div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal('new-group-modal')">Отмена</button>
      <button class="modal-btn primary" onclick="createGroup()">Создать</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signOut, onAuthStateChanged, updateProfile }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs,
  addDoc, query, where, orderBy, onSnapshot, updateDoc, serverTimestamp, arrayUnion }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ═══════════════════════════════════════════════════
//  🔧 ВСТАВЬТЕ СВОИ ДАННЫЕ FIREBASE СЮДА:
// ═══════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyAhD-Y2nf59Z9ESrIYqPRxTsuyXvX2LQEQ",
  authDomain: "vibe-e7317.firebaseapp.com",
  projectId: "vibe-e7317",
  storageBucket: "vibe-e7317.firebasestorage.app",
  messagingSenderId: "179418567747",
  appId: "1:179418567747:web:4226132681f26e72cb30f6",
  measurementId: "G-CRNR3JN4G7"
};
// ═══════════════════════════════════════════════════

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentChatId = null;
let currentChatType = 'personal';
let contacts = [];
let chatFilter = 'all';
let unsubMessages = null;
let unsubChats = null;
let selectedGroupMembers = [];

// ─── HELPERS ───────────────────────────────────────
const phoneToEmail = p => p.replace(/\D/g, '') + '@vibe.app';
const initials = name => name ? name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() : '?';
const avatarColor = str => {
  const colors = ['#6c63ff','#a78bfa','#60a5fa','#34d399','#f59e0b','#f87171','#fb923c','#e879f9'];
  let h = 0; for (let c of str) h = (h * 31 + c.charCodeAt(0)) % colors.length;
  return colors[h];
};
const fmtTime = ts => {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
};
const fmtDay = ts => {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const today = new Date();
  if (d.toDateString() === today.toDateString()) return 'Сегодня';
  const yest = new Date(today); yest.setDate(today.getDate()-1);
  if (d.toDateString() === yest.toDateString()) return 'Вчера';
  return d.toLocaleDateString('ru',{day:'numeric',month:'long'});
};

// ─── AUTH ──────────────────────────────────────────
window.switchTab = t => {
  document.querySelectorAll('.auth-tab').forEach((el,i)=>el.classList.toggle('active',i===(t==='register'?1:0)));
  document.getElementById('login-form').classList.toggle('hidden', t==='register');
  document.getElementById('register-form').classList.toggle('hidden', t==='login');
};

window.doRegister = async () => {
  const name = document.getElementById('reg-name').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const err = document.getElementById('reg-error');
  if (!name || !phone || !pass) { err.textContent='Заполните все поля'; return; }
  if (pass.length < 6) { err.textContent='Пароль минимум 6 символов'; return; }
  err.textContent='';
  try {
    const email = phoneToEmail(phone);
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    await setDoc(doc(db, 'users', cred.user.uid), {
      uid: cred.user.uid, name, phone, email, createdAt: serverTimestamp()
    });
  } catch(e) {
    err.textContent = e.code === 'auth/email-already-in-use' ? 'Этот номер уже зарегистрирован' : e.message;
  }
};

window.doLogin = async () => {
  const phone = document.getElementById('login-phone').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  err.textContent='';
  try {
    await signInWithEmailAndPassword(auth, phoneToEmail(phone), pass);
  } catch(e) {
    err.textContent = e.code === 'auth/invalid-credential' ? 'Неверный номер или пароль' : e.message;
  }
};

window.doLogout = async () => { await signOut(auth); };

// ─── AUTH STATE ────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    const ini = initials(user.displayName || user.email);
    document.getElementById('my-avatar').textContent = ini;
    document.getElementById('profile-avatar-big').textContent = ini;
    document.getElementById('profile-name-big').textContent = user.displayName || '';
    document.getElementById('edit-name').value = user.displayName || '';
    const snap = await getDoc(doc(db,'users',user.uid));
    if (snap.exists()) {
      document.getElementById('profile-phone-big').textContent = snap.data().phone || '';
    }
    await loadContacts();
    subscribeChats();
    initEmojiPicker();
  } else {
    currentUser = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').classList.remove('visible');
    if (unsubChats) unsubChats();
    if (unsubMessages) unsubMessages();
  }
});

// ─── PROFILE ───────────────────────────────────────
window.openProfile = () => document.getElementById('profile-panel').classList.add('open');
window.closeProfile = () => document.getElementById('profile-panel').classList.remove('open');
window.saveProfile = async () => {
  const name = document.getElementById('edit-name').value.trim();
  if (!name) return;
  await updateProfile(currentUser, { displayName: name });
  await updateDoc(doc(db,'users',currentUser.uid), { name });
  document.getElementById('profile-name-big').textContent = name;
  document.getElementById('my-avatar').textContent = initials(name);
  document.getElementById('profile-avatar-big').textContent = initials(name);
  closeProfile();
};

// ─── CONTACTS ──────────────────────────────────────
async function loadContacts() {
  const snap = await getDoc(doc(db,'users',currentUser.uid));
  if (!snap.exists()) return;
  const contactUids = snap.data().contacts || [];
  contacts = [];
  for (const uid of contactUids) {
    const cs = await getDoc(doc(db,'users',uid));
    if (cs.exists()) contacts.push(cs.data());
  }
  renderContacts();
}

function renderContacts() {
  const list = document.getElementById('contacts-list');
  list.innerHTML = contacts.length ? contacts.map(c=>`
    <div class="contact-item" onclick="startChat('${c.uid}','${c.name}')">
      <div class="chat-avatar" style="background:${avatarColor(c.uid)};width:40px;height:40px;font-size:14px;">${initials(c.name)}</div>
      <div><div style="font-size:14px;font-weight:500;">${c.name}</div><div style="font-size:12px;color:var(--text2);">${c.phone||''}</div></div>
    </div>`).join('') : '<div style="text-align:center;color:var(--text3);padding:24px;font-size:13px;">Нет контактов</div>';
}

window.openContacts = () => document.getElementById('contacts-panel').classList.add('open');
window.closeContacts = () => document.getElementById('contacts-panel').classList.remove('open');

window.openAddContact = () => {
  document.getElementById('contact-phone-input').value='';
  document.getElementById('contact-error').textContent='';
  document.getElementById('user-found-result').innerHTML='';
  document.getElementById('add-contact-modal').classList.add('open');
};

let foundContactData = null;

window.searchAndAddContact = async () => {
  const phone = document.getElementById('contact-phone-input').value.trim();
  const err = document.getElementById('contact-error');
  const result = document.getElementById('user-found-result');
  err.textContent=''; result.innerHTML=''; foundContactData=null;
  if (!phone) { err.textContent='Введите номер'; return; }
  const email = phoneToEmail(phone);
  const q = query(collection(db,'users'), where('email','==',email));
  const snap = await getDocs(q);
  if (snap.empty) { err.textContent='Пользователь не найден. Убедитесь что номер зарегистрирован в Vibe'; return; }
  const found = snap.docs[0].data();
  if (found.uid === currentUser.uid) { err.textContent='Это ваш номер'; return; }
  foundContactData = found;
  result.innerHTML = `<div class="user-found-card">
    <div class="chat-avatar" style="background:${avatarColor(found.uid)};width:42px;height:42px;font-size:15px;">${initials(found.name)}</div>
    <div style="flex:1;">
      <div style="font-size:14px;font-weight:500;">${found.name}</div>
      <div style="font-size:12px;color:var(--text2);">${found.phone}</div>
    </div>
    <button class="modal-btn primary" style="padding:8px 14px;font-size:12px;" onclick="confirmAddContact()">Добавить</button>
  </div>`;
};

window.confirmAddContact = async () => {
  if (!foundContactData) return;
  await updateDoc(doc(db,'users',currentUser.uid), { contacts: arrayUnion(foundContactData.uid) });
  closeModal('add-contact-modal');
  await loadContacts();
};

// ─── CHATS ─────────────────────────────────────────
function subscribeChats() {
  const q = query(collection(db,'chats'), where('members','array-contains',currentUser.uid));
  unsubChats = onSnapshot(q, snap => {
    const chats = snap.docs.map(d=>({id:d.id,...d.data()}));
    chats.sort((a,b)=>(b.lastTime?.seconds||0)-(a.lastTime?.seconds||0));
    renderChatList(chats);
  });
}

function renderChatList(chats) {
  const list = document.getElementById('chat-list');
  let filtered = chats.filter(c=>{
    if (chatFilter==='personal') return c.type!=='group';
    if (chatFilter==='groups') return c.type==='group';
    return true;
  });
  const search = document.querySelector('.search-input').value.toLowerCase();
  if (search) filtered = filtered.filter(c=>(c.name||'').toLowerCase().includes(search));

  if (!filtered.length) {
    list.innerHTML='<div style="text-align:center;color:var(--text3);padding:32px;font-size:13px;">Нет чатов</div>';
    return;
  }
  list.innerHTML = filtered.map(c => {
    const name = c.type==='group' ? c.name : (c.memberNames?.[currentUser.uid=== c.members[0]?c.members[1]:c.members[0]] || 'Контакт');
    const uid2 = c.members.find(m=>m!==currentUser.uid);
    const color = avatarColor(uid2||c.id);
    const ini = initials(name);
    const unread = c.unread?.[currentUser.uid]||0;
    return `<div class="chat-item${c.id===currentChatId?' active':''}" onclick="openChat('${c.id}','${c.type||'personal'}')">
      <div class="chat-avatar" style="background:${color};">${ini}${c.type!=='group'?'<div class="online-dot"></div>':''}</div>
      <div class="chat-info">
        <div class="chat-name">${name}</div>
        <div class="chat-preview">${c.lastMsg||'Нет сообщений'}</div>
      </div>
      <div class="chat-meta">
        <div class="chat-time">${fmtTime(c.lastTime)}</div>
        ${unread>0?`<div class="unread-badge">${unread}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

window.filterChats = () => subscribeChats && subscribeChats();
window.switchChatTab = (t, el) => {
  chatFilter=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
};

// ─── OPEN CHAT ─────────────────────────────────────
window.openChat = async (chatId, type='personal') => {
  currentChatId = chatId;
  currentChatType = type;
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('active-chat').classList.remove('hidden');
  document.getElementById('active-chat').style.display='flex';

  // get chat info
  const chatSnap = await getDoc(doc(db,'chats',chatId));
  const chatData = chatSnap.data();
  const uid2 = chatData.members.find(m=>m!==currentUser.uid);
  let chatName = chatData.name||'Чат';
  if (type!=='group' && uid2) {
    const us = await getDoc(doc(db,'users',uid2));
    if (us.exists()) chatName = us.data().name;
  }
  const color = avatarColor(uid2||chatId);
  document.getElementById('ch-avatar').style.background=color;
  document.getElementById('ch-avatar').textContent=initials(chatName);
  document.getElementById('ch-name').textContent=chatName;
  document.getElementById('ch-status').textContent = type==='group'?`${chatData.members.length} участников`:'онлайн';

  // reset unread
  await updateDoc(doc(db,'chats',chatId),{[`unread.${currentUser.uid}`]:0});

  // mobile
  document.getElementById('sidebar').classList.add('hidden');
  document.getElementById('chat-area').classList.add('visible');

  subscribeMessages(chatId);
};

window.startChat = async (uid2, name) => {
  closeContacts();
  // find or create personal chat
  const q = query(collection(db,'chats'),
    where('members','array-contains',currentUser.uid),
    where('type','==','personal'));
  const snap = await getDocs(q);
  let existing = snap.docs.find(d=>d.data().members.includes(uid2));
  if (existing) { openChat(existing.id,'personal'); return; }
  // create
  const chatRef = await addDoc(collection(db,'chats'),{
    type:'personal', members:[currentUser.uid, uid2],
    memberNames:{[currentUser.uid]:currentUser.displayName,[uid2]:name},
    lastMsg:'', lastTime:serverTimestamp(),
    unread:{[currentUser.uid]:0,[uid2]:0}
  });
  openChat(chatRef.id,'personal');
};

// ─── MESSAGES ──────────────────────────────────────
function subscribeMessages(chatId) {
  if (unsubMessages) unsubMessages();
  const q = query(collection(db,'chats',chatId,'messages'), orderBy('time','asc'));
  unsubMessages = onSnapshot(q, snap => {
    const msgs = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderMessages(msgs);
  });
}

function renderMessages(msgs) {
  const area = document.getElementById('messages-area');
  let lastDay = '';
  let html = '';
  msgs.forEach(m => {
    const day = fmtDay(m.time);
    if (day !== lastDay) {
      html += `<div class="msg-day">${day}</div>`;
      lastDay=day;
    }
    const me = m.sender === currentUser.uid;
    html += `<div class="msg-wrap ${me?'me':'other'}">
      <div class="msg-bubble">
        ${m.mediaUrl?`<img src="${m.mediaUrl}" class="msg-media" onerror="this.style.display='none'">`:''}
        ${m.text?`<span>${m.text}</span>`:''}
      </div>
      <div class="msg-time">${fmtTime(m.time)}${me?' ✓✓':''}</div>
    </div>`;
  });
  area.innerHTML = html;
  area.scrollTop = area.scrollHeight;
}

window.sendMessage = async () => {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !currentChatId) return;
  input.value=''; autoResize(input);
  const msgData = { text, sender: currentUser.uid, time: serverTimestamp() };
  await addDoc(collection(db,'chats',currentChatId,'messages'), msgData);
  // update chat
  const chatSnap = await getDoc(doc(db,'chats',currentChatId));
  const members = chatSnap.data().members;
  const unreadUpdate = {};
  members.filter(m=>m!==currentUser.uid).forEach(m=>{ unreadUpdate[`unread.${m}`]=((chatSnap.data().unread||{})[m]||0)+1; });
  await updateDoc(doc(db,'chats',currentChatId),{lastMsg:text.slice(0,60),lastTime:serverTimestamp(),...unreadUpdate});
};

window.attachFile = async (input) => {
  const file = input.files[0];
  if (!file || !currentChatId) return;
  if (file.size > 3 * 1024 * 1024) { alert('Файл слишком большой (макс. 3 МБ)'); input.value=''; return; }
  const reader = new FileReader();
  reader.onload = async e => {
    const base64 = e.target.result;
    const msgData = { mediaUrl: base64, mediaType: file.type, text:'', sender: currentUser.uid, time: serverTimestamp() };
    await addDoc(collection(db,'chats',currentChatId,'messages'), msgData);
    await updateDoc(doc(db,'chats',currentChatId),{lastMsg:'📷 Фото',lastTime:serverTimestamp()});
  };
  reader.readAsDataURL(file);
  input.value='';
};

// ─── GROUPS ────────────────────────────────────────
window.openNewGroup = () => {
  selectedGroupMembers=[];
  document.getElementById('group-name-input').value='';
  document.getElementById('group-chips').innerHTML='';
  const sel = document.getElementById('group-contacts-select');
  sel.innerHTML = contacts.map(c=>`
    <div class="contact-item" onclick="toggleGroupMember('${c.uid}','${c.name}',this)" style="padding:8px 14px;">
      <div class="chat-avatar" style="background:${avatarColor(c.uid)};width:34px;height:34px;font-size:12px;">${initials(c.name)}</div>
      <div style="font-size:13px;">${c.name}</div>
    </div>`).join('') || '<div style="padding:12px;font-size:12px;color:var(--text3);">Нет контактов</div>';
  document.getElementById('new-group-modal').classList.add('open');
};

window.toggleGroupMember = (uid, name, el) => {
  const idx = selectedGroupMembers.findIndex(m=>m.uid===uid);
  if (idx>=0) {
    selectedGroupMembers.splice(idx,1);
    el.style.background='';
  } else {
    selectedGroupMembers.push({uid,name});
    el.style.background='var(--bg4)';
  }
  document.getElementById('group-chips').innerHTML = selectedGroupMembers.map(m=>`
    <span class="group-member-chip">${m.name}<span class="chip-remove" onclick="toggleGroupMember('${m.uid}','${m.name}',document.querySelector('[onclick*=\\'${m.uid}\\']'))">✕</span></span>`).join('');
};

window.createGroup = async () => {
  const name = document.getElementById('group-name-input').value.trim();
  if (!name) return;
  const members = [currentUser.uid, ...selectedGroupMembers.map(m=>m.uid)];
  const unread = {}; members.forEach(m=>unread[m]=0);
  const chatRef = await addDoc(collection(db,'chats'),{
    type:'group', name, members, lastMsg:'', lastTime:serverTimestamp(), unread,
    createdBy:currentUser.uid
  });
  closeModal('new-group-modal');
  openChat(chatRef.id,'group');
};

// ─── EMOJI PICKER ──────────────────────────────────
const EMOJIS = ['😀','😂','🥰','😍','🤩','😎','🥳','😊','😉','😋','🤔','😅','😭','😤','🤯','😱','🥺','😴','🤗','😇','👍','👎','❤️','🔥','✨','🎉','💯','👏','🙌','🤝','💪','🙏','👋','🤞','✌️','🫶','💬','📱','🎵','🎶','🌟','⭐','💫','🌈','🍕','🍔','☕','🎂','🎁','🚀'];
function initEmojiPicker() {
  const picker = document.getElementById('emoji-picker');
  picker.innerHTML = EMOJIS.map(e=>`<button class="emoji-btn-item" onclick="insertEmoji('${e}')">${e}</button>`).join('');
}
window.toggleEmoji = () => {
  document.getElementById('emoji-picker').classList.toggle('open');
};
window.insertEmoji = e => {
  const inp = document.getElementById('msg-input');
  inp.value += e; inp.focus();
  document.getElementById('emoji-picker').classList.remove('open');
};
document.addEventListener('click', ev => {
  if (!ev.target.closest('#emoji-picker') && !ev.target.closest('[onclick="toggleEmoji()"]')) {
    document.getElementById('emoji-picker')?.classList.remove('open');
  }
});

// ─── UI HELPERS ────────────────────────────────────
window.msgKeydown = e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} };
window.autoResize = el => { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; };
window.closeModal = id => document.getElementById(id).classList.remove('open');
window.goBack = () => {
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('chat-area').classList.remove('visible');
};

// close contacts when clicking outside
document.addEventListener('click', e => {
  const panel = document.getElementById('contacts-panel');
  if (panel.classList.contains('open') && !panel.contains(e.target) && !e.target.closest('[onclick="openContacts()"]')) {
    panel.classList.remove('open');
  }
});
</script>
</body>
</html>
